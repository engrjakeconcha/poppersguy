<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storefront</title>
    <meta
      name="description"
      content="Browse deluLubes and PoppersGuyPH catalogs inside Telegram or on the web."
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function () {
        const host = window.location.hostname.replace(/^www\./, "").toLowerCase();
        const poppersHosts = new Set([
          "poppers.jcit.digital",
          "project-jaz0l.vercel.app",
          "project-jaz0l-jakeconcha-7757s-projects.vercel.app",
        ]);
        const deluHosts = new Set(["delu.jcit.digital"]);
        if (poppersHosts.has(host) && window.location.pathname === "/") {
          window.location.replace(`/poppers${window.location.search}${window.location.hash}`);
        }
        if (deluHosts.has(host) && window.location.pathname === "/") {
          window.location.replace(`/delu${window.location.search}${window.location.hash}`);
        }
      })();
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__glow"></div>
        <div class="hero__copy">
          <p class="eyebrow" id="store-badge">Store Catalog</p>
          <h1 id="store-title">Loading catalog…</h1>
          <p id="store-description" class="hero__description">
            Pulling the latest items from the store.
          </p>
          <div class="hero__actions">
            <button id="copy-link" class="cta cta--secondary" type="button">Copy Store Link</button>
          </div>
          <div id="chat-status" class="chat-status" hidden>
            <span id="chat-status-label" class="pill pill--ghost">Live chat unavailable</span>
            <p id="chat-status-copy" class="chat-status__copy"></p>
          </div>
        </div>
      </header>

      <main class="catalog">
        <section class="toolbar">
          <div class="search-wrap">
            <label class="sr-only" for="search">Search products</label>
            <input id="search" type="search" placeholder="Search product, category, or keyword" />
          </div>
          <div class="filters" id="filters"></div>
        </section>

        <section class="catalog-grid" id="product-grid" aria-live="polite"></section>
      </main>
    </div>

    <template id="product-card-template">
      <article class="product-card">
        <div class="product-card__media">
          <img class="product-card__image" alt="" loading="lazy" />
        </div>
        <div class="product-card__body">
          <div class="product-card__head">
            <p class="product-card__category"></p>
            <span class="product-card__stock"></span>
          </div>
          <h2 class="product-card__title"></h2>
          <p class="product-card__description"></p>
          <div class="product-card__footer">
            <strong class="product-card__price"></strong>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
