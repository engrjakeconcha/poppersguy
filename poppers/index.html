<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoppersGuyPH Catalog</title>
    <meta
      name="description"
      content="Browse PoppersGuyPH products inside Telegram or on the web."
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script
      id="retell-widget"
      src="https://dashboard.retellai.com/retell-widget.js"
      type="module"
      data-public-key="public_key_b16031bf6fd0c0d9f2be9"
      data-agent-id="agent_75c854665db40f81ec86c5ba82"
      data-agent-version="13"
      data-title="PoppersGuyPH Concierge"
      data-logo-url="https://raw.githubusercontent.com/jcitservices-ai/delulubes/main/poppersguyph/assets/pgphlogo.png"
      data-color="#c81d39"
      data-bot-name="PoppersGuyPH Concierge"
      data-popup-message="Ask about products, promo codes, or same-day delivery."
      data-show-ai-popup="true"
      data-show-ai-popup-time="5"
      data-auto-open="false"
    ></script>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("open_chat") !== "1") {
          return;
        }
        window.addEventListener("load", () => {
          setTimeout(() => {
            const launcher =
              document.querySelector('[aria-label*="chat" i]') ||
              document.querySelector('[aria-label*="assistant" i]') ||
              document.querySelector("#retell-widget-launcher") ||
              document.querySelector("retell-widget") ||
              document.querySelector("button[data-retell-launcher]");
            if (launcher && typeof launcher.click === "function") {
              launcher.click();
            }
          }, 1200);
        });
      })();
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__glow"></div>
        <div class="hero__copy">
          <p class="eyebrow" id="store-badge">Store Catalog</p>
          <h1 id="store-title">Loading catalog…</h1>
          <p id="store-description" class="hero__description">
            Pulling the latest items from the store.
          </p>
          <div class="hero__meta">
            <span id="product-count" class="pill">0 items</span>
            <span id="category-count" class="pill pill--ghost">0 categories</span>
          </div>
          <div class="hero__actions">
            <button id="copy-link" class="cta cta--secondary" type="button">Copy Store Link</button>
          </div>
          <div class="chat-status">
            <span class="pill pill--ghost">Live chat enabled</span>
            <p class="chat-status__copy">
              Use the chat bubble to ask questions, place orders, or request delivery help.
            </p>
          </div>
        </div>
      </header>

      <main class="catalog">
        <section class="toolbar">
          <div class="search-wrap">
            <label class="sr-only" for="search">Search products</label>
            <input id="search" type="search" placeholder="Search product, category, or keyword" />
          </div>
          <div class="filters" id="filters"></div>
        </section>

        <section class="catalog-grid" id="product-grid" aria-live="polite"></section>
      </main>
    </div>

    <template id="product-card-template">
      <article class="product-card">
        <div class="product-card__media">
          <img class="product-card__image" alt="" loading="lazy" />
        </div>
        <div class="product-card__body">
          <div class="product-card__head">
            <p class="product-card__category"></p>
            <span class="product-card__stock"></span>
          </div>
          <h2 class="product-card__title"></h2>
          <p class="product-card__description"></p>
          <div class="product-card__footer">
            <strong class="product-card__price"></strong>
            <button class="product-card__button" type="button">Checkout with AI</button>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
